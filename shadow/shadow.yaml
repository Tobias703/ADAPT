general:
  stop_time: 7m

network:
  graph:
    type: gml
    file: 
      path: ./topology.gml
host_option_defaults:
  pcap_enabled: true

hosts:
  # Tor Network
  4uthority:
    network_node_id: 2
    ip_addr: 100.0.0.1
    processes:
    - path: tor
      args: --Address 4uthority --Nickname 4uthority
            --defaults-torrc torrc-defaults -f torrc
      start_time: 1s
      expected_final_state: running
  exit1:
    network_node_id: 2
    processes:
    - path: tor
      args: --Address exit1 --Nickname exit1
            --defaults-torrc torrc-defaults -f torrc
      start_time: 1m
      expected_final_state: running
  exit2:
    network_node_id: 2
    processes:
    - path: tor
      args: --Address exit2 --Nickname exit2
            --defaults-torrc torrc-defaults -f torrc
      start_time: 1m
      expected_final_state: running
  relay1:
    network_node_id: 2
    processes:
    - path: tor
      args: --Address relay1 --Nickname relay1
            --defaults-torrc torrc-defaults -f torrc
      start_time: 1m
      expected_final_state: running
  relay2:
    network_node_id: 2
    processes:
    - path: tor
      args: --Address relay2 --Nickname relay2
            --defaults-torrc torrc-defaults -f torrc
      start_time: 1m
      expected_final_state: running
  relay3:
    network_node_id: 2
    processes:
    - path: tor
      args: --Address relay3 --Nickname relay3
            --defaults-torrc torrc-defaults -f torrc
      start_time: 1m
      expected_final_state: running
  relay4:
    network_node_id: 2
    processes:
    - path: tor
      args: --Address relay4 --Nickname relay4
            --defaults-torrc torrc-defaults -f torrc
      start_time: 1m
      expected_final_state: running

  # pt-client inside censored Network
  client4:
    ip_addr: 100.0.0.4
    network_node_id: 0
    processes:
    - path: /usr/bin/tor # tor via pt
      args: --Address client --Nickname client --defaults-torrc torrc-defaults -f torrc
      environment:
        RUST_BACKTRACE: "1"
      start_time: 4m
      expected_final_state: running
    - path: /usr/bin/tor # raw tor
      args: --Address clientnopt --Nickname clientnopt --defaults-torrc torrc-defaults -f torrc-nopt
      start_time: 4m
      expected_final_state: running
    - path: /usr/bin/curl # curl via pt
      args: ["--max-time", "60", "--socks5-hostname", "127.0.0.1:9052", "tinbkh6cadabugehfqjqydkd74heoifq2x4q2my44a5oi4546f4oklqd.onion"]
      start_time: 5m
      expected_final_state: {exited: 0}
    - path: /usr/bin/curl # direct curl
      args: ["--max-time", "60", "http://100.0.0.10:8080"]
      start_time: 5m
      expected_final_state: {exited: 28}

  client3:
    ip_addr: 100.0.0.3
    network_node_id: 0
    processes:
    - path: /usr/bin/tor # tor via pt
      args: --Address client --Nickname client --defaults-torrc torrc-defaults -f torrc
      environment:
        RUST_BACKTRACE: "1"
      start_time: 4m
      expected_final_state: running
    - path: /usr/bin/tor # raw tor
      args: --Address clientnopt --Nickname clientnopt --defaults-torrc torrc-defaults -f torrc-nopt
      start_time: 4m
      expected_final_state: running
    - path: /usr/bin/curl # curl via pt
      args: ["--max-time", "60", "--socks5-hostname", "127.0.0.1:9052", "tinbkh6cadabugehfqjqydkd74heoifq2x4q2my44a5oi4546f4oklqd.onion"]
      start_time: 5m
      expected_final_state: {exited: 0}
    - path: /usr/bin/curl # direct curl
      args: ["--max-time", "60", "http://100.0.0.10:8080"]
      start_time: 5m
      expected_final_state: {exited: 28}

  # pt-bridge as bridge into Tor Network
  bridge:
    ip_addr: 100.0.0.10
    network_node_id: 1
    processes:
      - path: /usr/bin/tor
        args: --Address bridge --Nickname bridge --defaults-torrc torrc-defaults -f torrc
        start_time: 3m
        expected_final_state: running
  
  # Target resource, unreachable directly from client
  target:
    ip_addr: 100.0.0.20
    network_node_id: 2
    processes:
    - path: /usr/bin/python3
      args: -m http.server 8080
      start_time: 5s
      expected_final_state: running
    - path: /usr/bin/tor # Tor hidden service
      args: --defaults-torrc torrc-defaults -f torrc
      start_time: 3m
      expected_final_state: running
    
